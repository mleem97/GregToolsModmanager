name: "Bug report"
description: "Report a reproducible bug"
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this issue.
        Please provide as much detail as possible so we can reproduce and fix it quickly.

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Clear and concise summary of the problem.
      placeholder: "When I click ..., the app ..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected ..."
    validations:
      required: true

  - type: dropdown
    id: install_type
    attributes:
      label: Installation type
      options:
        - Installer (Program Files)
        - Portable/local install
        - Build from source
        - Not sure
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      placeholder: "e.g. 1.0.2"

  - type: input
    id: os_version
    attributes:
      label: Windows version
      placeholder: "e.g. Windows 11 24H2"

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: Paste logs from Settings -> Logs or attach screenshots.
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues.
          required: true
        - label: I included clear reproduction steps.
          required: true

