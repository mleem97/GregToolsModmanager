name: Build Setup (Self-Signed)

on:
  workflow_dispatch:

jobs:
  select-linux-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      runs_on: ${{ steps.select.outputs.runs_on }}
    permissions:
      actions: read

    steps:
      - name: Select Linux runner (max 10m wait)
        id: select
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const wantedLabels = ['self-hosted', 'linux'];
            const attempts = 20;
            const intervalMs = 30000;

            function hasLabels(runner, labels) {
              const runnerLabels = (runner.labels || []).map(l => String(l.name).toLowerCase());
              return labels.every(l => runnerLabels.includes(l));
            }

            let selected = JSON.stringify('ubuntu-latest');
            for (let i = 0; i < attempts; i++) {
              const res = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              const idle = (res.data.runners || []).find(r =>
                r.status === 'online' && !r.busy && hasLabels(r, wantedLabels)
              );

              if (idle) {
                selected = JSON.stringify(['self-hosted', 'linux']);
                core.info(`Using self-hosted linux runner: ${idle.name}`);
                break;
              }

              if (i < attempts - 1) {
                core.info(`No idle self-hosted linux runner yet (attempt ${i + 1}/${attempts}), waiting 30s...`);
                await sleep(intervalMs);
              }
            }

            if (selected === JSON.stringify('ubuntu-latest')) {
              core.warning('No idle self-hosted linux runner within 10 minutes, falling back to ubuntu-latest.');
            }

            core.setOutput('runs_on', selected);

  preflight-linux:
    needs: [select-linux-runner]
    runs-on: ${{ fromJSON(needs.select-linux-runner.outputs.runs_on) }}
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Linux preflight (malicious scan)
        shell: bash
        run: |
          python3 .github/scripts/malicious_scan.py \
            --days 3 \
            --output malicious-scan.sarif \
            --summary malicious-scan-summary.txt

  build-selfsigned-setup:
    runs-on: windows-latest
    needs: [preflight-linux]
    if: ${{ needs.preflight-linux.result == 'success' }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress

      - name: Create self-signed code-signing certificate
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=mleem97, O=Greg Modding Team" `
            -KeyUsage DigitalSignature `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -HashAlgorithm SHA256 `
            -NotAfter (Get-Date).AddYears(2) `
            -CertStoreLocation Cert:\CurrentUser\My `
            -FriendlyName "GregTools CI Self-Signed Code Signing"

          "CODE_SIGN_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Using certificate thumbprint: $($cert.Thumbprint)"

      - name: Build setup and sign (self-signed)
        shell: pwsh
        run: |
          .\build.ps1 -Sign

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: selfsigned-setup
          path: installer/Output/GregToolsModmanager-*-Setup.exe
          if-no-files-found: error

      - name: Add trust warning to job summary
        shell: pwsh
        run: |
          @"
          ### Self-signed build artifact

          This setup is signed with a **self-signed certificate** generated in CI.

          - Publisher name can be shown in signature details.
          - Windows/SmartScreen may still show warning dialogs.
          - This is **not** equivalent to OV/EV CA code signing.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append -Encoding utf8
