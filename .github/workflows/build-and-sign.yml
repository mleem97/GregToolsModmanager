name: gregModmanager Build & Sign

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:
    inputs:
      signing:
        description: "Signing mode: auto = PFX when secret exists, else self-signed"
        type: choice
        options:
          - auto
          - self-signed
          - pfx
        default: "auto"

env:
  SOLUTION_PATH: GregModmanager.sln
  DOTNET_VERSION: 9.0.x
  APP_NAME: gregModmanager

jobs:
  select-runners:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      actions: read
    outputs:
      linux_runs_on: ${{ steps.select.outputs.linux_runs_on }}
      windows_runs_on: ${{ steps.select.outputs.windows_runs_on }}

    steps:
      - name: Select Linux and Windows runners (max 10m wait)
        id: select
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const attempts = 20;
            const intervalMs = 30000;

            function hasLabels(runner, labels) {
              const runnerLabels = (runner.labels || []).map(l => String(l.name).toLowerCase());
              return labels.every(l => runnerLabels.includes(l));
            }

            async function findIdle(labels) {
              const res = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });
              return (res.data.runners || []).find(r => r.status === 'online' && !r.busy && hasLabels(r, labels));
            }

            let linuxRunsOn = JSON.stringify('ubuntu-latest');
            let windowsRunsOn = JSON.stringify('windows-latest');

            for (let i = 0; i < attempts; i++) {
              const linuxIdle = await findIdle(['self-hosted', 'linux']);
              const windowsIdle = await findIdle(['self-hosted', 'windows']);

              if (linuxIdle) {
                linuxRunsOn = JSON.stringify(['self-hosted', 'linux']);
              }
              if (windowsIdle) {
                windowsRunsOn = JSON.stringify(['self-hosted', 'windows']);
              }

              if (linuxIdle && windowsIdle) {
                break;
              }

              if (i < attempts - 1) {
                await sleep(intervalMs);
              }
            }

            core.setOutput('linux_runs_on', linuxRunsOn);
            core.setOutput('windows_runs_on', windowsRunsOn);

  preflight-linux:
    needs: [select-runners]
    runs-on: ${{ fromJSON(needs.select-runners.outputs.linux_runs_on) }}
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Linux preflight (malicious scan)
        shell: bash
        run: |
          if [ -f .github/scripts/malicious_scan.py ]; then
            python3 .github/scripts/malicious_scan.py \
              --days 3 \
              --output malicious-scan.sarif \
              --summary malicious-scan-summary.txt
          else
            echo "No scan script found, skipping." > malicious-scan-summary.txt
          fi

      - name: Upload preflight summary
        uses: actions/upload-artifact@v4
        with:
          name: preflight-linux-summary
          path: malicious-scan-summary.txt
          if-no-files-found: warn

  build-linux:
    needs: [select-runners, preflight-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Build Linux Headless
        shell: bash
        run: |
          # Use the script we created or run inline
          dotnet publish GregModmanager.csproj -c Release -f net9.0 -r linux-x64 --self-contained true /p:PublishSingleFile=true /p:PublishTrimmed=false -o ./linux-out

      - name: Prepare Artifact
        shell: bash
        run: |
          cd linux-out
          chmod +x GregModmanager
          tar -czvf ../gregModmanager-linux-x64.tar.gz GregModmanager

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-headless
          path: gregModmanager-linux-x64.tar.gz
          if-no-files-found: error

  build-windows:
    runs-on: ${{ fromJSON(needs.select-runners.outputs.windows_runs_on) }}
    needs: [select-runners, preflight-linux]
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        shell: pwsh
        run: dotnet workload install maui-windows

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:SOLUTION_PATH

      - name: Build (Release)
        shell: pwsh
        run: dotnet build $env:SOLUTION_PATH -c Release --no-restore

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Determine signing mode
        id: signing
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
          SIGNING_INPUT: ${{ inputs.signing || 'auto' }}
        run: |
          $mode = $env:SIGNING_INPUT
          $hasPfx = -not [string]::IsNullOrWhiteSpace($env:PFX_BASE64)
          if ($mode -eq 'auto') { $mode = if ($hasPfx) { 'pfx' } else { 'self-signed' } }
          "signing_mode=$mode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Decode PFX certificate from secret
        if: steps.signing.outputs.signing_mode == 'pfx'
        shell: pwsh
        env:
          PFX_BASE64: ${{ secrets.CODE_SIGN_PFX_BASE64 }}
          PFX_PWD: ${{ secrets.CODE_SIGN_PFX_PASSWORD }}
        run: |
          $pfxBytes = [System.Convert]::FromBase64String($env:PFX_BASE64)
          $pfxPath = Join-Path $env:RUNNER_TEMP 'code-signing.pfx'
          [System.IO.File]::WriteAllBytes($pfxPath, $pfxBytes)
          "CODE_SIGN_PFX=$pfxPath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "CODE_SIGN_PFX_PASSWORD=$($env:PFX_PWD)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Create self-signed code-signing certificate
        if: steps.signing.outputs.signing_mode == 'self-signed'
        shell: pwsh
        run: |
          $cert = New-SelfSignedCertificate -Type CodeSigningCert -Subject "CN=mleem97" -KeyUsage DigitalSignature -KeyAlgorithm RSA -KeyLength 2048 -HashAlgorithm SHA256 -NotAfter (Get-Date).AddDays(7) -CertStoreLocation Cert:\CurrentUser\My -FriendlyName "GregTools CI"
          "CODE_SIGN_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build, package, and sign
        shell: pwsh
        run: .\build.ps1 -Sign

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'bin\Release\net9.0-windows10.0.19041.0\win-x64\publish'
          $version = 'latest'
          try {
            [xml]$csproj = Get-Content -LiteralPath (Join-Path $env:GITHUB_WORKSPACE 'GregModmanager.csproj')
            $version = ($csproj.Project.PropertyGroup | ForEach-Object { $_.ApplicationDisplayVersion } | Where-Object { $_ } | Select-Object -First 1).Trim()
          } catch {}
          $zipPath = "installer/Output/$env:APP_NAME-$version-Portable.zip"
          Compress-Archive -Path (Join-Path $publishDir '*') -DestinationPath $zipPath -CompressionLevel Optimal

      - name: Upload Windows setup
        uses: actions/upload-artifact@v4
        with:
          name: setup
          path: installer/Output/gregModmanager-*-Setup.exe

      - name: Upload portable zip
        uses: actions/upload-artifact@v4
        with:
          name: portable-zip
          path: installer/Output/gregModmanager-*-Portable.zip

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'release' && github.event.action == 'published' }}
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            setup/gregModmanager-*-Setup.exe
            portable-zip/gregModmanager-*-Portable.zip
            linux-headless/gregModmanager-linux-x64.tar.gz
          fail_on_unmatched_files: true
          append_body: true
          body: |
            ### Platform Assets
            - **Windows**: [Setup Installer](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/gregModmanager-v1.0.0.30-pre-Setup.exe) / [Portable ZIP](...)
            - **Linux / Steam Deck**: Native CLI binary (`.tar.gz`)
