name: Discord Release Notification

on:
  workflow_run:
    workflows: ["gregModmanager Build & Sign"]
    types: [completed]

jobs:
  select-linux-runner:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release' }}
    runs-on: ubuntu-latest
    timeout-minutes: 12
    outputs:
      runs_on: ${{ steps.select.outputs.runs_on }}
    permissions:
      actions: read

    steps:
      - name: Select Linux runner (max 10m wait)
        id: select
        uses: actions/github-script@v7
        with:
          script: |
            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const wantedLabels = ['self-hosted', 'linux'];
            const attempts = 20;
            const intervalMs = 30000;

            function hasLabels(runner, labels) {
              const runnerLabels = (runner.labels || []).map(l => String(l.name).toLowerCase());
              return labels.every(l => runnerLabels.includes(l));
            }

            let selected = JSON.stringify('ubuntu-latest');
            for (let i = 0; i < attempts; i++) {
              const res = await github.rest.actions.listSelfHostedRunnersForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              });

              const idle = (res.data.runners || []).find(r =>
                r.status === 'online' && !r.busy && hasLabels(r, wantedLabels)
              );

              if (idle) {
                selected = JSON.stringify(['self-hosted', 'linux']);
                core.info(`Using self-hosted linux runner: ${idle.name}`);
                break;
              }

              if (i < attempts - 1) {
                core.info(`No idle self-hosted linux runner yet (attempt ${i + 1}/${attempts}), waiting 30s...`);
                await sleep(intervalMs);
              }
            }

            if (selected === JSON.stringify('ubuntu-latest')) {
              core.warning('No idle self-hosted linux runner within 10 minutes, falling back to ubuntu-latest.');
            }

            core.setOutput('runs_on', selected);

  notify-discord:
    needs: [select-linux-runner]
    runs-on: ${{ fromJSON(needs.select-linux-runner.outputs.runs_on) }}
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release' }}
    permissions:
      contents: read
      actions: read

    steps:
      - name: Resolve release metadata from workflow SHA
        id: resolve_release
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = context.payload.workflow_run.head_sha;
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            async function resolveTagToCommitSha(tagName) {
              const ref = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });

              if (ref.data.object.type === 'commit') {
                return ref.data.object.sha;
              }

              if (ref.data.object.type === 'tag') {
                const tagObj = await github.rest.git.getTag({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_sha: ref.data.object.sha,
                });
                return tagObj.data.object.sha;
              }

              return null;
            }

            let matchedRelease = null;
            for (const release of releases) {
              try {
                const commitSha = await resolveTagToCommitSha(release.tag_name);
                if (commitSha === headSha) {
                  matchedRelease = release;
                  break;
                }
              } catch (error) {
                core.warning(`Failed to resolve tag ${release.tag_name}: ${error.message}`);
              }
            }

            if (!matchedRelease) {
              core.setFailed(`No release found for workflow SHA ${headSha}`);
              return;
            }

            core.setOutput('tag_name', matchedRelease.tag_name);
            core.setOutput('release_url', matchedRelease.html_url);

      - name: Send Discord webhook (release published)
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG_NAME: ${{ steps.resolve_release.outputs.tag_name }}
          RELEASE_URL: ${{ steps.resolve_release.outputs.release_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is empty, skipping notification."
            exit 0
          fi

          app_name="gregModmanager"
          version="${TAG_NAME:-unknown}"

          payload=$(cat <<EOF
          {
            "username": "GitHub Releases",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "content": "🚀 **New release published** for \`${REPO}\`",
            "embeds": [
              {
                "title": "New ${app_name} Release: ${version}",
                "description": "New ${app_name} Release: ${version}",
                "url": "${RELEASE_URL}",
                "color": 5763719
              }
            ],
            "components": [
              {
                "type": 1,
                "components": [
                  {
                    "type": 2,
                    "style": 5,
                    "label": "Download",
                    "url": "${RELEASE_URL}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
