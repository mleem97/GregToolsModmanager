name: Discord Release Notification

on:
  release:
    types: [published]

jobs:
  notify-discord-selfhosted-linux:
    runs-on: [self-hosted, linux]
    permissions:
      contents: read

    steps:
      - name: Send Discord webhook (release published)
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO: ${{ github.repository }}
        run: |
          app_name="GregTools Modmanager"
          version="${TAG_NAME:-unknown}"

          payload=$(cat <<EOF
          {
            "username": "GitHub Releases",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "content": "🚀 **New release published** for \`${REPO}\`",
            "embeds": [
              {
                "title": "New ${app_name} Release: ${version}",
                "description": "New ${app_name} Release: ${version}",
                "url": "${RELEASE_URL}",
                "color": 5763719
              }
            ],
            "components": [
              {
                "type": 1,
                "components": [
                  {
                    "type": 2,
                    "style": 5,
                    "label": "Download",
                    "url": "${RELEASE_URL}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"

  notify-discord-hosted-fallback:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [notify-discord-selfhosted-linux]
    if: always() && needs.notify-discord-selfhosted-linux.result != 'success'

    steps:
      - name: Send Discord webhook (fallback)
        shell: bash
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is empty, skipping notification."
            exit 0
          fi

          app_name="GregTools Modmanager"
          version="${TAG_NAME:-unknown}"

          payload=$(cat <<EOF
          {
            "username": "GitHub Releases",
            "avatar_url": "https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png",
            "content": "🚀 **New release published** for \`${REPO}\` (hosted fallback)",
            "embeds": [
              {
                "title": "New ${app_name} Release: ${version}",
                "description": "New ${app_name} Release: ${version}",
                "url": "${RELEASE_URL}",
                "color": 5763719
              }
            ],
            "components": [
              {
                "type": 1,
                "components": [
                  {
                    "type": 2,
                    "style": 5,
                    "label": "Download",
                    "url": "${RELEASE_URL}"
                  }
                ]
              }
            ]
          }
          EOF
          )

          curl -sS -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$payload"
