name: gregtools-platform

services:
  mcp:
    build:
      context: ./infra/mcp
    container_name: greg-mcp
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform

  wiki:
    image: ghcr.io/requarks/wiki:2
    container_name: greg-wiki
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_TYPE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-modstore}
      DB_PASS: ${POSTGRES_PASSWORD:-modstore_password}
      DB_NAME: ${WIKI_DB_NAME:-wiki}
    ports:
      - "3000:3000"
    volumes:
      - wiki_data:/wiki/data
    networks:
      - platform

  datacentermods-modstore:
    image: nginx:1.27-alpine
    container_name: datacentermods-modstore
    depends_on:
      modstore-api:
        condition: service_healthy
    ports:
      - "8090:80"
    volumes:
      - ./infra/modstore-web/index.html:/usr/share/nginx/html/index.html:ro
      - ./infra/modstore-web/default.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform

  modstore-api:
    build:
      context: ./infra/modstore-api
    container_name: modstore-api
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      PORT: 8080
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-modstore}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-modstore-assets}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - platform

  minio:
    image: minio/minio:latest
    container_name: modstore-s3
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - platform

  postgres:
    image: postgres:16-alpine
    container_name: modstore-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-modstore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-modstore_password}
      POSTGRES_DB: ${POSTGRES_DB:-modstore}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-modstore} -d ${POSTGRES_DB:-modstore}"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - platform

networks:
  platform:
    driver: bridge

volumes:
  pg_data:
  minio_data:
  wiki_data:
